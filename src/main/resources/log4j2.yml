Configuration:
  status: INFO
  Appenders:
    Console:
      name: ConsoleAppender
      target: SYSTEM_OUT
      PatternLayout:
        pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5level ${sys:PID} --- [%15.15t] %-40.40logger{39} : %msg%n"
  Loggers:
    Root:
      level: INFO
      AppenderRef:
        - ref: ConsoleAppender
    Logger:
      - name: com.ecalero.hacom
        level: DEBUG